name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Build
        run: npm run build
        working-directory: app
        env:
          VITE_GROQ_API_KEY: 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
          VITE_ELEVENLABS_API_KEY: sk_d36c8525b450a193b58231b83a2f2d89a99965a3433c931d
          VITE_GOOGLE_VISION_KEY: AIzaSyB3qfZObc0PD8EE7hc9fEHUgHj74GG4DiI
          VITE_SUPERVISOR_PASSWORD: care2024

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

      - uses: actions/deploy-pages@v4
        id: deployment
